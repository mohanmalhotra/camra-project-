<!DOCTYPE html>
<html lang="en">
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camera Test</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #222; color: white; padding-top: 50px; }
        video { border: 3px solid #00ff88; border-radius: 10px; background: #000; }
    </style>
</head>
<body>
    <body>
<!-- Do alag buttons taaki rasta saaf ho -->
    <div style="margin-bottom: 20px;">
        <button id="startCamBtn" style="padding: 10px 20px; font-size: 16px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; margin-right: 10px;">
            📸 Phone (Start Camera)
        </button>
        <button id="startWatchBtn" style="padding: 10px 20px; font-size: 16px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer;">
            💻 Laptop (Watch Screen)
        </button>
    </div>

   <!-- Video/Image dikhane wala dabba -->
    <div style="border: 3px solid #2ecc71; display: inline-block; border-radius: 10px; overflow: hidden; background: #000; width: 400px; height: 300px;">
        <!-- Phone ke liye video tag (jo frames capture karega) -->
        <video id="myVideo" autoplay playsinline width="400" height="300" style="display: none;"></video>
        
        <!-- Laptop ke liye image tag (jo live stream dikhayega) -->
        <img id="receiverImg" width="400" height="300" style="object-fit: cover; background: #000;" />
    </div>
</body></script>
</body>
</html>
