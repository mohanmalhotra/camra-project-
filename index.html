<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camera Streaming System</title>
</head>
<body style="background: #121212; color: white; font-family: sans-serif; text-align: center; padding: 20px;">

    <h2>🚀 Super CCTV Camera System</h2>
    
    <div style="margin-bottom: 20px;">
        <button id="startCamBtn" style="padding: 12px 24px; font-size: 16px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; margin-right: 10px; font-weight: bold;">
            📸 Phone (Start Camera)
        </button>
        <button id="startWatchBtn" style="padding: 12px 24px; font-size: 16px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">
            💻 Laptop (Watch Screen)
        </button>
    </div>

    <div style="border: 4px solid #2ecc71; display: inline-block; border-radius: 10px; overflow: hidden; background: #000; width: 400px; height: 300px; box-shadow: 0 0 15px rgba(46,204,113,0.4);">
        <video id="myVideo" autoplay playsinline width="400" height="300" style="display: none;"></video>
        
        <img id="receiverImg" width="400" height="300" style="object-fit: cover; background: #000;" src="https://via.placeholder.com/400x300/000000/FFFFFF?text=Waiting+for+Stream..." />
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    
    <script>
        // Direct Render ke live URL se connect
        const socket = io("https://camra-project.onrender.com");
        
        const videoElement = document.getElementById('myVideo');
        const receiverImage = document.getElementById('receiverImg');

        // Test connection logs
        socket.on('connect', () => {
            console.log("Connected to Server! ID:", socket.id);
        });

        // 📲 PHONE WALA CODE
        document.getElementById('startCamBtn').addEventListener('click', async () => {
            alert("Phone camera setting up... Permission allow kijiye!");
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" }, 
                    audio: false 
                }); 
                videoElement.srcObject = stream;
                videoElement.style.display = "block";
                receiverImage.style.display = "none"; // Phone par image chupa do
                
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.width = 400;
                canvas.height = 300;

                setInterval(() => {
                    if (videoElement.srcObject) {
                        context.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
                        const frameData = canvas.toDataURL('image/jpeg', 0.4);
                        socket.emit('video-frame', frameData);
                    }
                }, 100);

                alert("🟢 Phone Camera Live! Ab frames ja rahe hain.");
            } catch (err) {
                alert("🔴 Camera Error: " + err.message);
            }
        });

        // 💻 LAPTOP WALA CODE
        document.getElementById('startWatchBtn').addEventListener('click', () => {
            alert("🔵 Laptop Mode Active! Phone ka wait kijiye.");
            videoElement.style.display = "none";
            receiverImage.style.display = "block";
        });

        // Live frame receive karna
        socket.on('stream-frame', (frameData) => {
            receiverImage.src = frameData;
        });
    </script>
</body>
</html>
